# CML整幕思维导图（终版文字）

## 中心主题

* 慢性髓性白血病（CML）
  * 赵阿姨病例
  * 病例主线：感染表象下逐步收束到 CML，并最终明确为加速期

## 1. 病因 / 诱因 / 高危因素 / 一级预防

* 【蓝】直接分子病因
  * Philadelphia 染色体（Ph）
  * t(9;22)(q34;q11)
  * BCR::ABL1 融合基因
  * BCR::ABL1 持续激活酪氨酸激酶
  * 【红】第三幕已证实：Ph+
  * 【红】第三幕已证实：t(9;22)(q34;q11)
  * 【红】第三幕已证实：BCR-ABL（P210）阳性
  * 【红】第三幕已给出：IS BCR-ABL/ABL 0.36

* 【蓝】高危因素 / 可能诱因
  * 高频、高剂量电离辐射暴露
  * 苯及相关化学暴露
  * 其他职业与环境暴露
  * 年龄因素
  * 既往血液系统疾病
  * 家族史等可疑背景

* 【红】本病例值得结合的暴露线索
  * 皮鞋厂配底工经历
  * 长期环卫工作
  * 烧烤摊经营经历
  * 长期接触粉尘、烟雾、刺激性气体的可能

* 【橙】病例表述要点
  * 这些职业/环境经历可以作为“值得追问的危险因素”
  * 不能仅凭职业史就直接断言它们是本例 CML 的确定病因

* 【蓝】一级预防
  * 改善作业环境通风
  * 减少可疑化学暴露和烟雾暴露
  * 加强个体防护
  * 对高风险职业人群开展健康教育与定期血常规筛查

## 2. 发病机制

* 【蓝】总开关：BCR::ABL1 驱动
  * t(9;22) 形成 BCR::ABL1 融合基因
  * 融合酪氨酸激酶持续活化
  * 下游信号持续激活
  * 细胞增殖增强
  * 凋亡减少

* 【蓝】粒系异常扩增与核左移
  * 髓系异常克隆性扩增
  * 粒细胞从幼稚到较成熟各阶段都增多
  * 不是“只有原始细胞堆积”
  * 而是“成熟谱整体左移”
  * 可见中幼、晚幼、杆状核等阶段细胞增多

* 【蓝】嗜酸 / 嗜碱粒细胞增多
  * CML 常伴嗜酸性粒细胞增多
  * CML 常伴嗜碱性粒细胞增多
  * 这类改变有助于和单纯感染性反应区分

* 【蓝】骨髓与髓外表现
  * 骨髓增生极度活跃
  * 粒红比例升高
  * 骨髓增生活跃可对应胸骨压痛
  * 髓外造血 / 浸润可对应肝脾大与腹胀

* 【蓝】骨髓微环境与外周释放异常
  * 白血病细胞黏附、归巢、保留机制异常
  * 未成熟粒细胞更易进入外周血
  * 因而形成持续性幼稚粒细胞出现与核左移

* 【红】本病例“机制—表现”对应
  * 第一幕：近三四年反复疲乏
  * 第一幕：腹胀、体重下降
  * 第一幕：肝大、脾大
  * 第一幕：胸骨下段明显压痛
  * 第一幕：白细胞显著升高
  * 第一幕：嗜碱细胞增多
  * 第二幕：血涂片可见幼稚白细胞，以中幼及晚幼为主
  * 第二幕：骨髓增生极度活跃，以粒系为主，粒红比升高
  * 第二幕：嗜酸、嗜碱粒细胞增多
  * 第二幕：原始粒细胞 >10%
  * 【红】第三幕：流式提示异常髓系原始细胞约占有核细胞 12.02%

## 3. 诊断

* 【蓝】临床线索
  * 长期乏力
  * 腹胀
  * 体重下降
  * 发热、咳嗽、气短提示合并感染
  * 肝脾大
  * 胸骨压痛
  * 异常血象

* 【红】第一幕关键体征与初筛证据
  * 白细胞显著升高
  * 粒系异常偏高
  * 嗜碱细胞增多
  * 血小板减少
  * 脾肋下 6 cm
  * 肝肋下 2 cm
  * 胸骨下段明显压痛
  * 炎症标志物升高，提示感染确实存在
  * 但感染不能完整解释全部血液学异常

* 【蓝】形态学诊断依据
  * 外周血涂片：不同成熟阶段髓系细胞出现，整体左移
  * 骨髓象：增生极度活跃
  * 粒系为主
  * 粒红比例明显升高
  * 中性中幼、晚幼及杆状核粒细胞明显增多
  * 嗜酸、嗜碱粒细胞增多
  * 巨核细胞减少

* 【红】第二幕已具备的形态学证据
  * 血涂片：幼稚白细胞，以中幼及晚幼为主
  * 骨髓：增生极度活跃，以粒细胞为主
  * 骨髓：粒红比例明显增高
  * 骨髓：原始粒细胞 >10%
  * 第二幕结论：初步诊断为慢性髓性白血病

* 【蓝】细胞遗传学 / 分子生物学确诊
  * Ph 染色体
  * t(9;22)(q34;q11)
  * BCR::ABL1 融合基因
  * BCR::ABL1 定量检测
  * 细胞遗传学和分子学是最终确诊关键

* 【红】第三幕已补齐的确诊证据
  * Ph+
  * 显带分析：t(9;22)(q34;q11)
  * BCR-ABL（P210）阳性
  * BCR-ABL 拷贝数 68.64
  * ABL 拷贝数 1.89×10^4
  * IS BCR-ABL/ABL 0.36

* 【蓝】流式免疫分型
  * 目的：明确异常细胞谱系与成熟阶段
  * 作用：辅助分期与鉴别诊断
  * 异常髓系原始细胞比例具有分期意义

* 【红】第三幕流式结果
  * 异常细胞约占有核细胞 12.02%
  * 提示异常髓系原始细胞
  * 表达：CD117、CD33、CD123、HLA-DR、CD38
  * 部分表达：CD34、CD7、CD13、CD56
  * 弱表达：MPO
  * 不表达多项淋系与成熟相关标志
  * 并见嗜酸性粒细胞、嗜碱性粒细胞比例增高
  * 流式解释：不除外 CML 加速期可能

* 【蓝】分期判断
  * 慢性期：相对稳定
  * 加速期：病情进展，原始细胞增高，预后变差
  * 急变期：向急性白血病转化

* 【红】本病例分期推进
  * 第二幕已出现“原始粒细胞 >10%”
  * 第三幕流式示异常髓系原始细胞 12.02%
  * 第三幕结果解释写明“不除外 CML 加速期”
  * 第三幕医生最终诊断：慢性髓性白血病（加速期）

* 【蓝】二级预防
  * 对长期乏力、腹胀、脾大、异常血象患者尽早筛查
  * 血常规 + 外周血涂片 + 血液科转诊
  * 必要时尽早骨髓检查与分子学检查

* 【红】本病例可写成反思点
  * 若在“近三四年反复疲乏、腹胀”阶段就完成血常规与血液科评估
  * 也许能在合并肺部感染和胸水之前更早识别基础病

## 4. 鉴别诊断

* 【蓝】类白血病反应
  * 相同点：白细胞增高，可有左移
  * 不同点：CML 更常见脾大
  * 不同点：CML 更常见胸骨压痛
  * 不同点：CML 更常见嗜碱细胞增多
  * 不同点：CML 更常见较完整的幼稚粒细胞谱
  * 不同点：骨髓改变更支持肿瘤性造血异常
  * 【红】本例整体更偏向 CML，而不是单纯感染性类白血病反应

* 【蓝】单纯肺炎 / 感染性疾病
  * 第一幕确有高热、咳嗽、气短、炎症指标升高
  * 影像学支持肺部感染存在
  * 但仅靠肺炎难以解释长期乏力、腹胀、脾大、胸骨压痛、嗜碱增多、骨髓异常
  * 【红】本例更像“CML为基础病 + 肺部感染为并发问题”

* 【蓝】恶性胸水（实体瘤相关）
  * 需考虑肺癌等实体瘤导致胸水
  * 胸水分析有助于鉴别炎性与恶性方向

* 【红】第二幕胸水结果
  * 淡黄色、微浑浊
  * Rivalta（+）
  * 比重 1.026
  * 总蛋白 35.7 g/L
  * 葡萄糖 5.99 mmol/L
  * CEA <1.73 ng/ml
  * 病理未见肿瘤细胞
  * 更支持炎性渗出液
  * 恶性胸水可能下降，但不能机械理解为“白血病胸水一定有肿瘤细胞”

* 【蓝】其他导致脾大的疾病
  * 肝硬化伴脾功能亢进
  * 血吸虫病
  * 其他血液系统肿瘤 / 其他 MPN
  * 【灰】课堂展示时点到即可，不建议展开过满

## 5. 治疗 / 三级预防 / 长期管理

* 【蓝】治疗总原则
  * 控制基础病：TKI 靶向治疗
  * 处理并发症：继续抗感染、支持治疗
  * 根据分期决定监测密度与后续策略

* 【红】本例已实施治疗
  * 第三幕：在继续抗感染基础上，口服靶向药格列卫 600 mg/d

* 【蓝】TKI 治疗相关管理
  * 规范、长期、规律服药
  * 动态复查血常规
  * 动态复查肝肾功能
  * 监测不良反应
  * 动态监测 BCR::ABL1 定量变化
  * 评估分子学反应

* 【蓝】三级预防
  * 规范长期治疗
  * 降低疾病进展与急变风险
  * 预防感染、出血等并发问题
  * 提高生活质量
  * 加强长期随访

* 【蓝】人文与社会支持
  * CML 具有长期慢病管理特点
  * 药物可及性与医保覆盖直接影响依从性
  * 经济负担会影响长期治疗坚持度

* 【红】本病例人文节点
  * 第三幕明确提到：2022 年格列卫医保价格进一步下降
  * 虽需长期用药，但靶向药可及性改善，对患者是重要支持因素

## 6. 预后

* 【蓝】影响预后的关键维度
  * 分期
  * 原始细胞比例
  * 嗜碱粒细胞比例
  * 血小板异常
  * 对 TKI 的治疗反应
  * 分子学监测结果

* 【红】本例不利因素
  * 第二幕已见原始粒细胞 >10%
  * 第三幕流式异常髓系原始细胞 12.02%
  * 血小板减少
  * 合并肺部感染与胸腔积液
  * 已不宜仅按“普通慢性期”理解

* 【红】本例有利因素
  * 已获得明确分子靶点证据
  * 已进入规范靶向治疗
  * 靶向药有医保可及性
  * 诊断方向已明确，不再停留在模糊怀疑阶段

* 【红】整幕最终收束
  * 第一幕：从“肺炎/感染”思路转向“感染合并血液病可能”
  * 第二幕：通过胸水与骨髓形态学把方向推向 CML，并开始警惕加速期
  * 第三幕：通过细胞遗传学、分子生物学和流式，将诊断收束为“慢性髓性白血病（加速期）”

## 7. 可选附加分支（建议做成角标或侧边小框，不做主干）

* 病例证据链总览
  * 第一幕：长期乏力、腹胀、消瘦、肝脾大、胸骨压痛、异常血象、感染证据
  * 第二幕：胸水为炎性渗出液；血涂片与骨髓象高度提示 CML
  * 第三幕：Ph+、t(9;22)、BCR::ABL1（P210）+、流式异常髓系原始细胞 12.02%、最终诊断 CML 加速期

  <script>
    // 在 markmap 初步渲染后，附加对应的颜色样式以实现高亮，并消除原始的括号标记
    setInterval(() => {
        document.querySelectorAll('svg g').forEach(g => {
            // markmap 有时使用 text，有时使用 innerHTML (foreignObject)
            const textEls = g.querySelectorAll('text');
            textEls.forEach(textEl => {
                const text = textEl.textContent;
                if (text.includes('【红】') || text.includes('【橙】') || text.includes('【蓝】') || text.includes('【灰】')) {
                    if (text.includes('【红】')) {
                        textEl.setAttribute('fill', '#e53e3e');
                        textEl.style.fontWeight = 'bold';
                    } else if (text.includes('【橙】')) {
                        textEl.setAttribute('fill', '#dd6b20');
                    } else if (text.includes('【蓝】')) {
                        textEl.setAttribute('fill', '#3182ce');
                    } else if (text.includes('【灰】')) {
                        textEl.setAttribute('fill', '#718096');
                    }
                    // 剔除标记本身
                    textEl.textContent = text.replace(/【红】|【橙】|【蓝】|【灰】/g, '');
                }
            });

            // 如果后续更新了版本用到了 foreignObject
            const htmlEls = g.querySelectorAll('div');
            htmlEls.forEach(el => {
                const html = el.innerHTML;
                if (html.includes('【红】') || html.includes('【橙】') || html.includes('【蓝】') || html.includes('【灰】')) {
                    if (html.includes('【红】')) {
                        el.style.color = '#e53e3e';
                        el.style.fontWeight = 'bold';
                    } else if (html.includes('【橙】')) {
                        el.style.color = '#dd6b20';
                    } else if (html.includes('【蓝】')) {
                        el.style.color = '#3182ce';
                    } else if (html.includes('【灰】')) {
                        el.style.color = '#718096';
                    }
                    el.innerHTML = html.replace(/【红】|【橙】|【蓝】|【灰】/g, '');
                }
            });
        });
    }, 100); // 缩短间隙，减少闪烁感
  </script>
